# devBuddy - Custom Buddy Template
# Copy this file and fill in your buddy's details.
# Place it in the buddies/ directory or a custom directory.

id: my-buddy          # Lowercase alphanumeric with hyphens only
name: My Buddy
description: "A brief description of your buddy"
version: 1

appearance:
  width: 16           # Max character width of ASCII art (1-40)
  height: 7           # Max line count of ASCII art (1-20)

  # Optional: hints for overlay display mode.
  overlay:
    preferredAnchor: bottom   # top | bottom (where the buddy docks in the terminal)
    padding: 1                # Extra blank rows inside the overlay region

# Stats range from 1-10
stats:
  wisdom: 5
  energy: 5
  humor: 5
  debugSkill: 5
  patience: 5

personality:
  traits:
    - friendly
  speechStyle: "Describe how your buddy talks."
  catchphrase: "Something catchy!"

# Animations - 'idle' is required, others are optional.
# Common states the engine uses: idle, happy, sad, thinking, celebrating, sleeping.
# You may define additional states and reference them via level unlocks.
animations:
  idle:
    frameDuration: 600  # ms per frame (min 50)
    loop: true
    frames:
      - |
        Your ASCII
        art here
      - |
        Second frame
        of animation

  happy:
    frameDuration: 400
    loop: false
    returnTo: idle      # After play-once, return to this state
    frames:
      - |
        Happy frame

# Dialogue categories - 'greetings' is required.
#
# Engine-recognized categories:
#   Terminal / shell:
#     greetings, farewell, idle, encouragement, testPass, testFail,
#     error, levelUp, gitCommit
#   AI agents (Claude, Cursor, Copilot):
#     agentPrompt     — user submits a prompt to an agent
#     agentTool       — agent invokes a tool (Edit, Bash, etc.)
#     agentEdit       — agent edits a file
#     agentComplete   — agent finishes a turn
#     agentError      — agent turn failed
#
# Unknown categories are accepted too; the engine just won't auto-select them,
# but level unlocks and chat responses can reference them.
dialogue:
  greetings:
    - "Hello!"
  testPass:
    - "Tests passed!"
  testFail:
    - "Tests failed..."
  error:
    - "An error occurred."
  idle:
    - "Just chillin."
  encouragement:
    - "Keep going!"
  levelUp:
    - "Level up!"
  farewell:
    - "Goodbye!"
  gitCommit:
    - "Nice commit!"

  # Agent-aware dialogue (optional)
  agentPrompt:
    - "Thinking about your prompt..."
  agentTool:
    - "Running a tool for you."
  agentEdit:
    - "Nice edit!"
  agentComplete:
    - "All done."
  agentError:
    - "That didn't go well."

# Optional: unlocks at specific levels
levelUnlocks:
  2:
    - type: dialogue
      category: idle
      entries:
        - "New dialogue at level 2!"
  5:
    - type: animation
      name: dancing
      definition:
        frameDuration: 300
        loop: false
        returnTo: idle
        frames:
          - |
            Dance frame 1
          - |
            Dance frame 2
